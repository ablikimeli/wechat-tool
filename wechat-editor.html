<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1070">
<title>微信公众号排版转换工具</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background:#f0f2f5;color:#2c3e50;min-height:100vh;
}
.header{
  background:linear-gradient(135deg,#07c160 0%,#06ad56 100%);
  color:#fff;padding:14px 24px;
  box-shadow:0 2px 8px rgba(7,193,96,.3);
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:16px;
}
.header h1{font-size:19px;font-weight:700}
.header p{font-size:12px;opacity:.78}
.header .badge{background:rgba(255,255,255,.2);padding:1px 9px;border-radius:9px;font-size:11px}
.main{display:flex;gap:0;height:calc(100vh - 55px)}
.panel-left{flex:1;min-width:0;display:flex;flex-direction:column;background:#fff;border-right:1px solid #e8e8e8}
.panel-tabs{display:flex;border-bottom:1px solid #e8e8e8;background:#fafafa;flex-shrink:0}
.panel-tab{
  padding:8px 16px;font-size:13px;cursor:pointer;
  border:none;background:none;color:#666;font-weight:500;position:relative;transition:color .15s;
}
.panel-tab:hover{color:#07c160}
.panel-tab.active{color:#07c160;background:#fff}
.panel-tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:#07c160}
.panel-body{flex:1;display:flex;flex-direction:column;min-height:0}
.panel-body.hidden{display:none}
#htmlInput{
  flex:1;width:100%;padding:12px 14px;
  border:none;outline:none;resize:none;
  font-family:"Cascadia Code","Fira Code",Consolas,monospace;
  font-size:13px;line-height:1.7;tab-size:2;
}
.upload-zone{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:#999;cursor:pointer;
  border:2px dashed #ddd;margin:14px;border-radius:12px;transition:all .2s;
}
.upload-zone:hover,.upload-zone.dragover{border-color:#07c160;color:#07c160;background:#f0faf4}
.upload-zone svg{width:40px;height:40px;opacity:.4}
.upload-zone p{font-size:13px}
.template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:6px;padding:12px}
.template-card{
  padding:10px 6px;border:1px solid #eee;border-radius:8px;
  text-align:center;cursor:pointer;font-size:12px;color:#666;transition:all .15s;
}
.template-card:hover{border-color:#07c160;color:#07c160;background:#f0faf4}
.template-card .icon{font-size:18px;margin-bottom:3px;display:block}
.image-manager{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.image-card{
  display:flex;gap:10px;align-items:center;
  padding:8px 10px;border:1px solid #eee;border-radius:8px;transition:border-color .15s;
}
.image-card:hover{border-color:#07c160}
.image-card .thumb{
  width:50px;height:50px;border-radius:4px;overflow:hidden;flex-shrink:0;
  background:#f5f5f5;display:flex;align-items:center;justify-content:center;
}
.image-card .thumb img{width:100%;height:100%;object-fit:cover}
.image-card .thumb .broken{color:#ccc;font-size:11px}
.image-card .info{flex:1;min-width:0}
.image-card .info .path{font-size:11px;color:#666;word-break:break-all;margin-bottom:1px}
.image-card .info .meta{font-size:10px;color:#bbb}
.image-card .actions{display:flex;gap:4px;flex-shrink:0}
.image-card .actions button{
  padding:3px 8px;font-size:10px;border:1px solid #ddd;
  border-radius:4px;background:#fff;cursor:pointer;color:#666;
}
.image-card .actions button:hover{border-color:#07c160;color:#07c160}
.image-card .broken-tag{
  display:inline-block;padding:0 7px;border-radius:3px;
  font-size:10px;background:#ffeaa7;color:#856404;margin-left:4px;
}
.image-manager-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:13px}

.toolbar{
  display:flex;gap:6px;padding:7px 12px;
  border-top:1px solid #e8e8e8;flex-wrap:wrap;align-items:center;flex-shrink:0;
}
.toolbar .spacer{flex:1}
.btn{
  display:inline-flex;align-items:center;gap:3px;
  padding:5px 12px;border:none;border-radius:5px;
  font-size:12px;cursor:pointer;font-weight:500;
  transition:all .15s;white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:#07c160;color:#fff}
.btn-primary:hover{background:#06ad56}
.btn-success{background:#2ecc71;color:#fff}
.btn-success:hover{background:#27ae60}
.btn-outline{background:#fff;color:#555;border:1px solid #ddd}
.btn-outline:hover{background:#f5f5f5;border-color:#ccc}
.btn-danger{background:#e74c3c;color:#fff}
.btn-danger:hover{background:#c0392b}
.btn-sm{padding:2px 7px;font-size:11px}

.panel-right{flex:1;min-width:0;display:flex;flex-direction:column;background:#f5f5f5}
.preview-toolbar{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;background:#fff;
  border-bottom:1px solid #e8e8e8;flex-shrink:0;
}
.preview-toolbar .info{font-size:11px;color:#999;flex:1;text-align:right}
.preview-wrapper{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:16px 12px;overflow:auto}
.preview-phone{
  width:420px;min-height:600px;
  background:#fff;box-shadow:0 2px 20px rgba(0,0,0,.1);border-radius:10px;overflow:hidden;
}
.preview-bar{
  display:flex;align-items:center;gap:5px;
  padding:12px 18px 6px;border-bottom:1px solid #eee;
}
.preview-bar .dot{display:inline-block;width:5px;height:5px;border-radius:50%}
.preview-bar .dot.r{background:#ff5f57}
.preview-bar .dot.y{background:#ffbd2e}
.preview-bar .dot.g{background:#28c840}
.preview-bar .label{font-size:10px;color:#ccc;margin-left:4px}
#preview{padding:12px 18px 30px;font-size:15px;line-height:1.75;color:#333;min-height:320px}
#preview p{margin:0 0 .75em}
#preview p:empty{display:none}
#preview h1,#preview h2,#preview h3,#preview h4{margin:1em 0 .4em;font-weight:700;line-height:1.5}
#preview h1{font-size:20px;text-align:center}
#preview h2{font-size:18px}
#preview h3{font-size:16px}
#preview blockquote{margin:.8em 0;padding:8px 14px;background:#f7f7f7;border-left:4px solid #07c160;color:#666;font-size:14px}
#preview ul,#preview ol{margin:.7em 0;padding-left:2em}
#preview li{margin:.2em 0}
#preview table{width:100%;margin:.8em 0;border-collapse:collapse;font-size:14px}
#preview th,#preview td{border:1px solid #ddd;padding:6px 10px;text-align:left}
#preview th{background:#f7f7f7;font-weight:600}
#preview img{max-width:100%;height:auto;display:block;margin:.8em auto;border-radius:4px}
#preview a{color:#07c160;text-decoration:underline}
#preview hr{margin:1.2em 0;border:none;border-top:1px solid #eee}
#preview pre{
  background:#ffffff;color:#24292f;padding:16px;margin:0;
  overflow-x:auto;font-size:13px;line-height:1.6;
  font-family:Consolas,"Courier New",monospace;white-space:pre;
  border-radius:0;
}
#preview pre code{background:none;padding:0;color:inherit;font-size:inherit;white-space:pre}
#preview code{
  background:#f0f0f0;color:#e74c3c;padding:2px 6px;border-radius:3px;
  font-family:Consolas,"Courier New",monospace;font-size:13px;
}

.debug-panel{display:none;border-top:2px solid #e74c3c;background:#1e1e1e;color:#d4d4d4;padding:10px 14px;font-size:12px;font-family:Consolas,monospace;max-height:200px;overflow:auto}
.debug-panel.open{display:block}

.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.78);color:#fff;
  padding:8px 22px;border-radius:8px;
  font-size:13px;z-index:999;pointer-events:none;
  opacity:0;transition:opacity .3s;
}
.toast.show{opacity:1}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  z-index:998;display:none;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:#fff;border-radius:12px;padding:22px;
  width:460px;max-width:90vw;
  box-shadow:0 8px 40px rgba(0,0,0,.15);
}
.modal-box h3{font-size:15px;margin-bottom:10px}
.modal-box label{font-size:12px;color:#666;display:block;margin-bottom:4px}
.modal-box input[type="text"]{
  width:100%;padding:7px 10px;border:1px solid #ddd;
  border-radius:5px;font-size:13px;margin-bottom:10px;
}
.modal-box input[type="text"]:focus{border-color:#07c160;outline:none}
.modal-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:12px}

@media(max-width:800px){
  .main{flex-direction:column;height:auto}
  .panel-left,.panel-right{height:50vh}
  .preview-phone{width:100%;min-height:auto}
}
</style>
</head>
<body>
<div class="header">
  <h1>微信公众号排版转换工具</h1>
  <span class="badge">v5.5</span>
  <p>HTML → WeChat 兼容 · 图片管理 · 一键复制 · 开源</p>
</div>

<div class="main">
  <div class="panel-left">
    <div class="panel-tabs">
      <button class="panel-tab active" data-tab="code">HTML 源码</button>
      <button class="panel-tab" data-tab="upload">上传文件</button>
      <button class="panel-tab" data-tab="templates">排版模板</button>
      <button class="panel-tab" data-tab="images">图片管理 <span id="imgBadge" style="font-size:10px;color:#999;"></span></button>
    </div>
    <div class="panel-body" id="panel-code">
      <textarea id="htmlInput" placeholder="在此粘贴 HTML 代码…&#10;Ctrl+Enter 快速转换"></textarea>
    </div>
    <div class="panel-body hidden" id="panel-upload">
      <div class="upload-zone" id="dropZone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>点击选择 HTML 文件，或拖拽到此处</p>
        <input type="file" id="fileInput" accept=".html,.htm" hidden>
      </div>
    </div>
    <div class="panel-body hidden" id="panel-templates">
      <div class="template-grid">
        <div class="template-card" data-template="article"><span class="icon">📝</span>文章正文</div>
        <div class="template-card" data-template="newsletter"><span class="icon">📰</span>资讯简报</div>
        <div class="template-card" data-template="product"><span class="icon">🏷️</span>产品介绍</div>
        <div class="template-card" data-template="notice"><span class="icon">📢</span>公告通知</div>
        <div class="template-card" data-template="quote"><span class="icon">💬</span>金句卡片</div>
        <div class="template-card" data-template="list"><span class="icon">✅</span>清单列表</div>
        <div class="template-card" data-template="tutorial"><span class="icon">💻</span>技术教程</div>
        <div class="template-card" data-template="event"><span class="icon">🎉</span>活动宣传</div>
        <div class="template-card" data-template="daily"><span class="icon">📊</span>日报周报</div>
        <div class="template-card" data-template="reading"><span class="icon">📚</span>读书笔记</div>
      </div>
    </div>
    <div class="panel-body hidden" id="panel-images">
      <div class="image-manager" id="imageManager">
        <div class="image-manager-empty">请先转换内容，图片会自动出现在这里</div>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" id="convertBtn">🔄 转换</button>
      <button class="btn btn-outline" id="clearBtn">🗑️ 清空</button>
      <button class="btn btn-outline btn-sm" id="debugBtn" style="color:#e74c3c;">🐛 HTML 源码</button>
      <span class="spacer"></span>
      <span id="stats" style="font-size:11px;color:#999;"></span>
    </div>
  </div>

  <div class="panel-right">
    <div class="preview-toolbar">
      <button class="btn btn-success" id="copyHtmlBtn">📋 复制 HTML</button>
      <button class="btn btn-success" id="copyRichBtn">📋 复制富文本（推荐）</button>
      <button class="btn btn-outline btn-sm" id="exportBtn">💾 导出</button>
      <span class="info" id="previewInfo"></span>
    </div>
    <div class="preview-wrapper">
      <div class="preview-phone">
        <div class="preview-bar">
          <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
          <span class="label">微信公众号 · 预览</span>
        </div>
        <div id="preview"></div>
      </div>
    </div>
    <pre class="debug-panel" id="debugPanel"></pre>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle">编辑图片路径</h3>
    <label for="modalInput">图片 URL</label>
    <input type="text" id="modalInput" placeholder="输入新的图片地址">
    <div class="modal-actions">
      <button class="btn btn-outline" id="modalCancel">取消</button>
      <button class="btn btn-primary" id="modalConfirm">确认</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ========== DOM refs ========== */
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const htmlInput = $('#htmlInput');
const preview  = $('#preview');
const debugPanel = $('#debugPanel');

/* ========== Toast ========== */
let tmr;
function toast(msg, dur) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(tmr);
  tmr = setTimeout(() => el.classList.remove('show'), dur||1800);
}

/* ========== Tab switch ========== */
$$('.panel-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    $$('.panel-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    $$('.panel-body').forEach(p => p.classList.add('hidden'));
    const tgt = document.getElementById('panel-' + tab.dataset.tab);
    if (tgt) tgt.classList.remove('hidden');
  });
});

/* ========== File upload ========== */
const dropZone = $('#dropZone');
const fileInput = $('#fileInput');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && /\.html?$/i.test(f.name)) readFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) readFile(fileInput.files[0]); });
function readFile(file) {
  const r = new FileReader();
  r.onload = e => { htmlInput.value = e.target.result; $$('[data-tab="code"]')[0].click(); convert(); toast('已加载 '+file.name); };
  r.readAsText(file, 'UTF-8');
}

/* ========== Templates ========== */
const TPL = {
  article: `<h1 style="text-align:center;font-size:22px;letter-spacing:2px;margin-bottom:0.8em;">文章标题</h1>
<p style="font-size:14px;color:#888;text-align:center;margin-bottom:2em;">作者 · 2025年4月</p>
<hr style="margin:1.5em 0;">
<p style="text-indent:2em;font-size:15px;line-height:1.8;margin:1em 0;">这是正文段落。建议段落间用空行分隔，提升阅读体验。适当使用<strong style="color:#e74c3c;">加粗彩色</strong>、<span style="background:#ffeaa7;padding:0 4px;">文字高亮</span>、<span style="color:#07c160;">绿色强调</span>等样式突出重点内容。</p>
<p style="text-indent:2em;font-size:15px;line-height:1.8;margin:1em 0;">第二个段落。合理的小标题可以让文章结构更清晰，读者也更容易找到感兴趣的部分。建议每段控制在 200 字以内。</p>
<h2 style="font-size:18px;font-weight:700;color:#2c3e50;border-left:4px solid #07c160;padding-left:12px;margin:1.5em 0 0.8em;">一、章节标题</h2>
<p style="text-indent:2em;font-size:15px;line-height:1.8;margin:1em 0;">章节内容在此。小标题使用左侧绿条装饰，让文章结构一目了然。</p>
<blockquote style="margin:1.5em 0;padding:12px 18px;background:#f8f8f8;border-left:4px solid #07c160;color:#555;font-size:14px;line-height:1.7;">引用金句或名人名言，使用引用样式突出显示。这是公众号文章中最常用的排版技巧之一。</blockquote>
<p style="text-align:center;color:#ccc;font-size:12px;margin-top:2em;">— END —</p>`,

  newsletter: `<h1 style="text-align:center;font-size:20px;letter-spacing:1px;margin-bottom:0.5em;">📰 资讯简报</h1>
<p style="color:#999;font-size:13px;text-align:center;margin-bottom:2em;">2025年4月28日 · 第 24 期</p>
<div style="background:#f0faf4;border-radius:8px;padding:16px;margin:1.5em 0;">
<p style="font-weight:700;color:#07c160;margin-bottom:8px;">📌 本期导读</p>
<p style="font-size:14px;color:#555;line-height:1.7;margin:0;">本期聚焦人工智能领域最新进展，涵盖行业动态、技术突破和深度分析三个板块。</p>
</div>
<h2 style="font-size:17px;font-weight:700;color:#2c3e50;margin:1.5em 0 0.5em;">📊 行业动态</h2>
<table style="width:100%;border-collapse:collapse;font-size:13px;margin:1em 0;">
<thead><tr><th style="border:1px solid #e0e0e0;padding:8px 10px;background:#f5f5f5;font-weight:600;">领域</th><th style="border:1px solid #e0e0e0;padding:8px 10px;background:#f5f5f5;font-weight:600;">动态</th></tr></thead>
<tbody>
<tr><td style="border:1px solid #e0e0e0;padding:8px 10px;">AI</td><td style="border:1px solid #e0e0e0;padding:8px 10px;">GPT-5 发布，推理能力大幅提升</td></tr>
<tr><td style="border:1px solid #e0e0e0;padding:8px 10px;">芯片</td><td style="border:1px solid #e0e0e0;padding:8px 10px;">新一代 AI 芯片算力提升 3 倍</td></tr>
<tr><td style="border:1px solid #e0e0e0;padding:8px 10px;">政策</td><td style="border:1px solid #e0e0e0;padding:8px 10px;">数据安全新规正式实施</td></tr>
</tbody>
</table>
<h2 style="font-size:17px;font-weight:700;color:#2c3e50;margin:1.5em 0 0.5em;">📖 深度阅读</h2>
<p style="text-indent:2em;font-size:15px;line-height:1.8;margin:1em 0;">本期推荐一篇关于 AI 未来的深度分析文章，探讨技术发展对就业、教育和社会的影响。</p>
<blockquote style="margin:1.5em 0;padding:12px 18px;background:#f8f8f8;border-left:4px solid #07c160;color:#555;font-size:14px;">「真正重要的不是信息数量，而是信息质量。」</blockquote>
<hr style="margin:1.5em 0;">
<p style="text-align:center;color:#999;font-size:12px;">感谢阅读，下期再见</p>`,

  product: `<h1 style="text-align:center;font-size:20px;letter-spacing:1px;margin-bottom:1em;">🏷️ 产品名称</h1>
<p style="text-align:center;color:#999;font-size:13px;margin-bottom:2em;">—— 让生活更简单 ——</p>
<div style="background:linear-gradient(135deg,#07c160,#06ad56);border-radius:10px;padding:20px;text-align:center;margin:1.5em 0;">
<p style="color:#fff;font-size:18px;font-weight:700;margin:0 0 6px;">一句话概括产品价值</p>
<p style="color:rgba(255,255,255,0.85);font-size:14px;margin:0;">解决什么问题，为谁而设计</p>
</div>
<h2 style="font-size:17px;font-weight:700;color:#2c3e50;margin:1.5em 0 0.5em;">✨ 核心功能</h2>
<div style="background:#f8f8f8;border-radius:8px;padding:16px;margin:1em 0;">
<p style="font-weight:700;font-size:15px;color:#07c160;margin:0 0 6px;">✦ 功能一</p>
<p style="font-size:14px;color:#555;line-height:1.7;margin:0;">详细说明第一个功能的特点和优势，配合具体使用场景描述。</p>
</div>
<div style="background:#f8f8f8;border-radius:8px;padding:16px;margin:1em 0;">
<p style="font-weight:700;font-size:15px;color:#07c160;margin:0 0 6px;">✦ 功能二</p>
<p style="font-size:14px;color:#555;line-height:1.7;margin:0;">详细说明第二个功能的特点和优势。</p>
</div>

 * Parse a <style> block into a list of {selector, declarations} rules.
 * Uses a state-machine to correctly handle nested braces, @media, @keyframes etc.
 */
function parseCSSRules(cssText) {
  const rules = [];
  // 1. Remove comments
  cssText = cssText.replace(/\/\*[\s\S]*?\*\//g, '');
  // 2. Remove @import / @charset single-line statements
  cssText = cssText.replace(/@(import|charset)\b[^;]+;/gi, '');

  // 3. State-machine: track brace depth
  let i = 0, cur = '', depth = 0, inMedia = false, skipBlock = false;
  const flushRule = () => {
    const braceIdx = cur.indexOf('{');
    if (braceIdx < 0) return;
    const selector = cur.slice(0, braceIdx).trim();
    const decls = cur.slice(braceIdx + 1).trim();
    if (!selector || !decls) return;
    // Split comma-separated selectors
    splitSelectors(selector).forEach(sel => {
      rules.push({ selector: sel, declarations: decls });
    });
  };

  while (i < cssText.length) {
    const ch = cssText[i];
    if (ch === '{') {
      if (depth === 0) {
        const before = cur.trim();
        if (/^@media\b/i.test(before)) { inMedia = true; cur += ch; depth++; }
        else if (before.startsWith('@')) { skipBlock = true; cur = ''; depth++; }
        else { cur += ch; depth++; }
      } else { cur += ch; depth++; }
    } else if (ch === '}') {
      depth--;
      if (depth === 0) {
        if (inMedia) { inMedia = false; /* rules inside @media already parsed */ }
        else if (!skipBlock) flushRule();
        skipBlock = false;
        cur = '';
      } else { cur += ch; }
    } else { cur += ch; }
    i++;
  }
  // Flush any remaining rule (unclosed brace)
  if (cur.trim() && !skipBlock && !inMedia) flushRule();
  return rules;
}

/**
 * Check if element matches a CSS selector.
 * Supports: tag, .class, #id, [attr], [attr=val], *,
 *           tag.class, .class1.class2, parent child, parent > child
 * Pseudo-classes/pseudo-elements are stripped automatically.
 */
function matchSel(el, selector) {
  if (!el || el.nodeType !== 1) return false;

  // Strip pseudo-classes/-elements
  const clean = stripPseudo(selector);
  if (!clean) return false;

  // Parse attribute selectors out of the selector string
  const attrParts = [];
  const attrRe = /\[([\w-]+)([*^$|~]?)=?([^\]]*)\]/g;
  let attrMatch;
  while ((attrMatch = attrRe.exec(clean)) !== null) {
    attrParts.push(attrMatch[0]);
  }
  // Remove attribute fragments from the selector for tag/class/id matching
  let selCore = clean.replace(/\[[\w-]+([*^$|~]?=([^\]]*))?\]/g, '').trim();

  // Direct child combinator: "parent > child"
  if (selCore.includes('>')) {
    const parts = selCore.split(/\s*>\s*/).filter(Boolean);
    const childSel = parts.pop();
    if (!simpleMatch(el, childSel, attrParts)) return false;
    let p = el.parentElement;
    const parentSel = parts.join(' > ');
    while (p) {
      if (simpleMatch(p, parentSel, [])) return true;
      p = p.parentElement;
    }
    return false;
  }

  // Descendant combinator: "parent child"
  if (selCore.includes(' ')) {
    const parts = selCore.split(/\s+/).filter(Boolean);
    const childSel = parts.pop();
    if (!simpleMatch(el, childSel, attrParts)) return false;
    let p = el.parentElement;
    const parentSel = parts.join(' ');
    while (p) {
      if (simpleMatch(p, parentSel, [])) return true;
      p = p.parentElement;
    }
    return false;
  }

  return simpleMatch(el, selCore, attrParts);
}

function simpleMatch(el, sel, attrParts) {
  if (!el || el.nodeType !== 1) return false;
  const tag = el.tagName.toLowerCase();
  const id = el.id || '';
  const cls = Array.from(el.classList);

  // Universal selector: if sel is '*' or empty after stripping, match any tag
  if (sel === '*' || sel === '') {
    // Still need to check attribute selectors
    if (attrParts.length) return attrParts.every(a => matchAttr(el, a));
    return true;
  }

  const classParts = sel.match(/\.([\w-]+)/g);
  const idPart = sel.match(/#([\w-]+)/);
  const tagPart = sel.match(/^([\w-]+)/);

  if (tagPart && tagPart[1].toLowerCase() !== tag) return false;
  if (idPart && idPart[1] !== id) return false;
  if (classParts) {
    const needed = classParts.map(c => c.slice(1));
    if (!needed.every(c => cls.includes(c))) return false;
  }
  if (!tagPart && !idPart && !classParts && !attrParts.length) return false;

  // Check attribute selectors
  if (attrParts.length && !attrParts.every(a => matchAttr(el, a))) return false;

  return true;
}

/**
 * Main conversion: raw HTML → WeChat-compatible HTML with preserved styles
 */
function convertHTML(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const body = doc.body || doc.documentElement;

  // ---- Step 1: Extract & parse <style> blocks, then remove them ----
  const cssRules = [];
  doc.querySelectorAll('style').forEach(el => {
    parseCSSRules(el.textContent).forEach(r => cssRules.push(r));
    el.remove();
  });

  // ---- Step 2: Remove unsupported tags (replace with text) ----
  doc.querySelectorAll(Array.from(REMOVE).join(',')).forEach(el => {
    const txt = document.createTextNode(el.textContent || '');
    el.parentNode.replaceChild(txt, el);
  });

  // ---- Step 3: Walk DOM — apply CSS rules, strip bad attrs, add defaults ----
  function walk(el) {
    if (el.nodeType !== 1) return;
    const tag = el.tagName.toLowerCase();

    // 3a. Find matching CSS rules and merge into inline style
    const matched = cssRules.filter(r => matchSel(el, r.selector));
    if (matched.length > 0) {
      let merged = el.getAttribute('style') || '';
      matched.forEach(r => {
        merged = mergeCSS(merged, r.declarations);
      });
      el.setAttribute('style', merged);
    }

    // 3b. Add default style ONLY if element has NO style at all
    const currentStyle = el.getAttribute('style') || '';
    if (!currentStyle.trim() && DEFAULTS[tag]) {
      el.setAttribute('style', DEFAULTS[tag]);
    }

    // 3c. Strip CSS properties WeChat can't render
    const st = el.getAttribute('style');
    if (st) el.setAttribute('style', stripBadCSS(st));

    // 3d. Strip non-allowed attributes (but keep class/id for now — needed for CSS matching above)
    Array.from(el.attributes).forEach(attr => {
      const n = attr.name.toLowerCase();
      if (n === 'style' || n === 'class' || n === 'id') return;
      if (!KEEP.has(n)) el.removeAttribute(n);
    });

    // Recurse children
    Array.from(el.children).forEach(walk);
  }
  Array.from(body.children).forEach(walk);

  // ---- Step 4: Transform <pre><code> to GitHub-style blocks ----
  wrapCodeBlocks(doc);

  // ---- Step 5: Clean class/id from output (not needed in WeChat) ----
  doc.querySelectorAll('[class],[id]').forEach(el => {
    el.removeAttribute('class');
    el.removeAttribute('id');
  });

  // ---- Step 6: Extract image info ----
  const images = [];
  doc.querySelectorAll('img').forEach(img => {
    const src = img.getAttribute('src') || '';
    images.push({
      origSrc: src,
      currentSrc: src,
      alt: img.getAttribute('alt') || '',
      width: img.getAttribute('width') || '',
      height: img.getAttribute('height') || '',
      broken: !src || src.startsWith('file://'),
    });
  });

  // ---- Step 7: Serialize ----
  let out = body.innerHTML;
  out = out.replace(/<\/?body[^>]*>/gi,'');
  out = out.replace(/<\/?html[^>]*>/gi,'');
  out = out.replace(/<\/?head[^>]*>/gi,'');
  out = out.replace(/<!\[CDATA\[/g,'').replace(/\]\]>/g,'');

  // ---- Stats ----
  const textContent = body.textContent || '';
  const charCount = textContent.replace(/\s/g,'').length;
  const pCount = (out.match(/<p[ >]/gi)||[]).length;
  const imgCount = (out.match(/<img[ >]/gi)||[]).length;
  const readTime = Math.max(1, Math.round(charCount/300));

  return { html: out, images, stats: { chars: charCount, paragraphs: pCount, images: imgCount, readTime } };
}

/** Merge two CSS declaration strings (second overrides first on conflict) */
function mergeCSS(a, b) {
  if (!b && !a) return '';
  if (!b) return a || '';
  if (!a) return b;
  const map = {};
  (a+';'+b).split(';').forEach(d => {
    const ci = d.indexOf(':');
    if (ci > 0) map[d.slice(0,ci).trim()] = d.slice(ci+1).trim();
  });
  return Object.entries(map).map(([k,v]) => `${k}:${v}`).join('; ');
}

/** Strip CSS properties that WeChat can't handle */
function stripBadCSS(css) {
  if (!css) return '';
  return css.split(';')
    .map(d => d.trim()).filter(d => {
      if (!d) return false;
      const prop = d.split(':')[0].trim().toLowerCase();
      // Check prefix blacklist
      for (const bad of STRIP_CSS) {
        if (prop === bad || prop.startsWith(bad)) return false;
      }
      return true;
    })
    .join('; ');
}

/**
 * Map language identifiers to display labels for GitHub code block headers.
 */
const LANG_LABELS = {
  js:'JavaScript', javascript:'JavaScript', ts:'TypeScript', typescript:'TypeScript',
  py:'Python', python:'Python', rb:'Ruby', ruby:'Ruby',
  java:'Java', go:'Go', rust:'Rust', c:'C', cpp:'C++',
  html:'HTML', htm:'HTML', css:'CSS', scss:'SCSS', less:'Less',
  json:'JSON', xml:'XML', yaml:'YAML', yml:'YAML', md:'Markdown', markdown:'Markdown',
  sh:'Shell', bash:'Bash', zsh:'Shell', sql:'SQL', php:'PHP',
  swift:'Swift', kotlin:'Kotlin', scala:'Scala', r:'R', dart:'Dart',
};

/**
 * Transform <pre><code> blocks into GitHub-style code blocks.
 * Adds a header bar with language label and a wrapper with rounded border.
 */
function wrapCodeBlocks(doc) {
  doc.querySelectorAll('pre').forEach(pre => {
    const code = pre.querySelector('code');
    if (!code) return;

    // Detect language from class="language-*", data-language, or infer
    let lang = 'Code';
    const cls = code.getAttribute('class') || '';
    const dataLang = pre.getAttribute('data-language') || '';
    const match = cls.match(/language-([\w#+]+)/i);
    if (match) {
      const raw = match[1];
      lang = LANG_LABELS[raw.toLowerCase()] || raw;
    } else if (dataLang) {
      lang = LANG_LABELS[dataLang.toLowerCase()] || dataLang;
    }

    // Build wrapper — GitHub light style (gray background, black text)
    const wrap = doc.createElement('div');
    wrap.setAttribute('style', 'border:1px solid #d0d7de;border-radius:6px;overflow:hidden;margin:.8em 0;');

    // Build header bar
    const hdr = doc.createElement('div');
    hdr.setAttribute('style', 'background:#f6f8fa;padding:6px 16px;border-bottom:1px solid #d0d7de;font-size:12px;color:#57606a;font-family:Consolas,"Courier New",monospace;line-height:1.8;');
    hdr.textContent = lang;

    // Reset pre for GitHub light code area
    pre.setAttribute('style', 'background:#ffffff;color:#24292f;padding:16px;margin:0;border:0;border-radius:0;overflow-x:auto;white-space:pre;font-size:13px;line-height:1.6;font-family:Consolas,"Courier New",monospace;');

    // Reset code inside pre
    code.setAttribute('style', 'background:none;color:inherit;padding:0;margin:0;font-size:inherit;font-family:inherit;line-height:inherit;white-space:pre;border:0;');

    // Reparent
    pre.parentNode.replaceChild(wrap, pre);
    wrap.appendChild(hdr);
    wrap.appendChild(pre);
  });
}

/* ========== Image Manager with Upload ========== */
let imageList = [];
let imageReplacements = {}; // idx -> base64 data URL, survives re-convert
const imgManager = $('#imageManager');
const imgBadge = $('#imgBadge');

function renderImages() {
  if (imageList.length === 0) {
    imgManager.innerHTML = '<div class="image-manager-empty">当前内容中没有图片</div>';
    imgBadge.textContent = '';
    return;
  }
  imgBadge.textContent = `(${imageList.length})`;

  // Upload area at top
  let cards = `<div style="background:#e8f8f0;border:1px solid #b2dfc8;border-radius:8px;padding:8px 12px;font-size:11px;color:#2c6e49;margin-bottom:8px;">
    💡 图片无法显示？点击下方「上传」选取本地图片，自动嵌入文章中。大图片（&gt;500KB）建议先用
    <a href="https://www.boltp.com/?ref=www.7udh.com" target="_blank" style="color:#07c160;">boltp.com</a> 压缩后再上传。
  </div>
  <div style="display:flex;gap:6px;margin-bottom:10px;align-items:center;">
    <label class="btn btn-sm" style="background:#07c160;color:#fff;cursor:pointer;display:inline-flex;gap:3px;padding:5px 12px;border-radius:5px;font-size:12px;">
      📤 上传图片替换
      <input type="file" id="imgUploadInput" accept="image/*" multiple style="display:none;">
    </label>
    <span style="font-size:10px;color:#999;">支持 jpg/png/gif/webp，自动转 base64 嵌入</span>
  </div>`;

  imageList.forEach((img, i) => {
    const replaced = imageReplacements[i];
    const currentSrc = replaced || img.currentSrc;
    const broken = !currentSrc || currentSrc.startsWith('file://');
    const thumb = broken
      ? '<span class="broken">⚠️</span>'
      : `<img src="${currentSrc.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}" onerror="this.parentElement.innerHTML='<span class=\\'broken\\'>⚠️</span>'" alt="">`;

    const label = replaced
      ? '<span class="broken-tag" style="background:#07c160;color:#fff;">已嵌入</span>'
      : (broken ? '<span class="broken-tag">需处理</span>' : '');

    cards += `<div class="image-card">
      <div class="thumb">${thumb}</div>
      <div class="info">
        <div class="path">${(currentSrc||'(空)').slice(0,40)}${((currentSrc||'').length>40?'…':'')} ${label}</div>
        <div class="meta">${img.alt?'alt: '+img.alt.slice(0,15)+' · ':''}${img.width||img.height?img.width+'×'+img.height+' · ':''}索引 ${i+1}${replaced ? ' · 内嵌 '+(replaced.length>>10)+'KB' : ''}</div>
      </div>
      <div class="actions">
        <button data-idx="${i}" class="im-upload btn-sm" style="background:#07c160;color:#fff;border:none;border-radius:4px;cursor:pointer;padding:3px 8px;font-size:10px;">上传</button>
        <button data-idx="${i}" class="im-edit btn-sm" style="border:1px solid #ddd;border-radius:4px;cursor:pointer;padding:3px 8px;font-size:10px;background:#fff;">编辑</button>
        ${replaced ? `<button data-idx="${i}" class="im-revert btn-sm" style="border:1px solid #e74c3c;border-radius:4px;cursor:pointer;padding:3px 8px;font-size:10px;color:#e74c3c;background:#fff;">还原</button>` : ''}
      </div>
    </div>`;
  });
  imgManager.innerHTML = cards;

  // Hidden file input for each image card
  imageList.forEach((img, i) => {
    const card = imgManager.querySelectorAll('.image-card')[i];
    if (!card) return;

    // Upload button
    card.querySelector('.im-upload')?.addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*';
      input.onchange = () => {
        if (!input.files[0]) return;
        const file = input.files[0];
        const fileMB = file.size / 1024 / 1024;
        if (fileMB > 3) {
          toast(`⚠️ 图片 ${fileMB.toFixed(1)}MB 偏大，转 base64 后约 ${(fileMB*1.4).toFixed(0)}MB，建议压缩到 2MB 以下`, 3000);
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          const dataUrl = e.target.result;
          imageReplacements[i] = dataUrl;
          // Update preview
          const imgs = preview.querySelectorAll('img');
          if (imgs[i]) imgs[i].setAttribute('src', dataUrl);
          toast(`✅ 已嵌入 ${file.name} (原${fileMB.toFixed(1)}MB → base64 ${dataKB}KB)`);
          renderImages();
        };
        reader.readAsDataURL(file);
      };
      input.click();
    });

    // Edit button
    card.querySelector('.im-edit')?.addEventListener('click', () => {
      const currentSrc = imageReplacements[i] || imageList[i].currentSrc;
      showModal('编辑图片路径 #'+(i+1),
        currentSrc.startsWith('data:') ? '(base64 内嵌)' : currentSrc,
        (v) => {
          if (!v) return;
          delete imageReplacements[i];
          imageList[i].currentSrc = v;
          syncImages();
          toast('图片路径已更新');
        });
    });

    // Revert button (only for replaced images)
    card.querySelector('.im-revert')?.addEventListener('click', () => {
      delete imageReplacements[i];
      const origSrc = imageList[i].origSrc;
      imageList[i].currentSrc = origSrc;
      const imgs = preview.querySelectorAll('img');
      if (imgs[i]) imgs[i].setAttribute('src', origSrc);
      toast('已还原为原始路径');
      renderImages();
    });
  });

  // Upload multiple images at once (for the top upload button)
  const bulkInput = document.getElementById('imgUploadInput');
  if (bulkInput) {
    // Remove old listener by cloning
    const newInput = bulkInput.cloneNode(true);
    bulkInput.parentNode.replaceChild(newInput, bulkInput);
    newInput.addEventListener('change', () => {
      const files = Array.from(newInput.files);
      if (files.length === 0) return;
      let done = 0;
      files.forEach((file, fi) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          // Find first broken image and replace it
          for (let i = 0; i < imageList.length; i++) {
            if (!imageReplacements[i] && (!imageList[i].currentSrc || imageList[i].currentSrc.startsWith('file://'))) {
              imageReplacements[i] = e.target.result;
              const imgs = preview.querySelectorAll('img');
              if (imgs[i]) imgs[i].setAttribute('src', e.target.result);
              done++;
              break;
            }
          }
          if (fi === files.length - 1) {
            toast(`✅ 已嵌入 ${done} 张图片`);
            renderImages();
          }
        };
        reader.readAsDataURL(file);
      });
      newInput.value = '';
    });
  }
}

function syncImages() {
  let i = 0;
  preview.querySelectorAll('img').forEach(img => {
    if (imageReplacements[i]) {
      img.setAttribute('src', imageReplacements[i]);
    } else if (i < imageList.length && imageList[i].currentSrc !== imageList[i].origSrc) {
      img.setAttribute('src', imageList[i].currentSrc);
    }
    i++;
  });
}

/** Apply stored image replacements to the preview DOM after re-convert */
function applyReplacements() {
  const keys = Object.keys(imageReplacements);
  if (keys.length === 0) return;
  const imgs = preview.querySelectorAll('img');
  keys.forEach(k => {
    const idx = parseInt(k);
    if (imgs[idx]) {
      imgs[idx].setAttribute('src', imageReplacements[k]);
    }
  });
  // Update debug panel
  debugPanel.textContent = preview.innerHTML;
}

/* ========== Main convert function ========== */
function convert() {
  const raw = htmlInput.value.trim();
  if (!raw) {
    preview.innerHTML = '<p style="color:#bbb;text-align:center;padding:60px 0;">请输入 HTML 内容后点击转换</p>';
    debugPanel.classList.remove('open');
    debugPanel.textContent = '';
    $('#stats').textContent = '';
    $('#previewInfo').textContent = '等待输入…';
    imageList = [];
    renderImages();
    return;
  }

  try {
    const result = convertHTML(raw);
    preview.innerHTML = result.html;
    debugPanel.textContent = result.html;
    imageList = result.images;
    // Re-apply any uploaded image replacements
    applyReplacements();
    renderImages();

    const s = result.stats;
    $('#stats').textContent = `字符 ${s.chars} · 段落 ${s.paragraphs} · 图片 ${s.images} · 阅读约 ${s.readTime} 分钟`;
    $('#previewInfo').textContent = `预览 · ${s.chars} 字`;

    // Mark broken images in preview
    preview.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('src')||'';
      if (!src || src.startsWith('file://')) {
        img.style.border = '2px dashed #e74c3c';
        img.style.padding = '4px';
        img.style.background = '#fff5f5';
      }
    });

  } catch(e) {
    preview.innerHTML = `<p style="color:#e74c3c;padding:40px;text-align:center;">转换出错：${e.message}</p>`;
    debugPanel.textContent = 'Error: ' + e.message + '\n' + e.stack;
    toast('转换出错', 2000);
  }
}

/* ========== Copy / Export ========== */
function wrapHTML(inner) {
  return `<!-- 微信公众号排版 - 转换工具 -->
<section style="padding:0 10px;max-width:100%;">
${inner}
</section>`;
}

$('#copyHtmlBtn').addEventListener('click', () => {
  const h = preview.innerHTML;
  if (!h||h.startsWith('<p style="color:#bbb')) { toast('请先转换内容'); return; }
  const w = wrapHTML(h);
  navigator.clipboard.write([new ClipboardItem({ 'text/plain': new Blob([w], {type:'text/plain'}) })]).then(() => {
    toast('HTML 已复制，粘贴到公众号编辑器', 1600);
  }).catch(() => fallbackCopy(w, 'HTML 已复制'));
});

$('#copyRichBtn').addEventListener('click', () => {
  const h = preview.innerHTML;
  if (!h||h.startsWith('<p style="color:#bbb')) { toast('请先转换内容'); return; }
  const rich = wrapHTML(h);
  navigator.clipboard.write([new ClipboardItem({ 'text/html': new Blob([rich], {type:'text/html'}) })]).then(() => {
    toast('富文本已复制！可直接粘贴到公众号编辑器', 1600);
  }).catch(() => fallbackCopy(rich, '已复制 HTML'));
});

function fallbackCopy(text, msg) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); toast(msg); }
  catch(e) { toast('复制失败，请手动选择复制'); }
  document.body.removeChild(ta);
}

$('#exportBtn').addEventListener('click', () => {
  const h = preview.innerHTML;
  if (!h||h.startsWith('<p style="color:#bbb')) { toast('请先转换内容'); return; }
  const full = `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>公众号文章</title></head>
<body style="font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;padding:20px;max-width:680px;margin:0 auto;color:#333;font-size:15px;line-height:1.75;">
${h}
</body></html>`;
  const blob = new Blob([full], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'wechat-article.html';
  a.click(); URL.revokeObjectURL(url);
  toast('已导出 wechat-article.html');
});

});

htmlInput.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); convert(); }
});

let acTimer;
htmlInput.addEventListener('input', () => {
  clearTimeout(acTimer);
  acTimer = setTimeout(convert, 1200);
});

/* ========== Paste rich text handler ========== */
htmlInput.addEventListener('paste', () => {
  setTimeout(() => {
    const text = htmlInput.value;
    if (!text || /<[a-z][\s\S]*>/i.test(text.slice(0,200))) return;
    navigator.clipboard.read().then(items => {
      for (const item of items) {
        if (item.types.includes('text/html')) {
          item.getType('text/html').then(blob => blob.text().then(rich => {
            if (rich && rich.length > text.length) {
              htmlInput.value = rich;
              convert();
            }
          }));
          break;
        }
      }
    }).catch(() => {});
  }, 120);
});
