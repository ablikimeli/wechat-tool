<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1070">
<title>微信公众号排版转换工具</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background:#f0f2f5;color:#2c3e50;min-height:100vh;
}
.header{
  background:linear-gradient(135deg,#07c160 0%,#06ad56 100%);
  color:#fff;padding:14px 24px;
  box-shadow:0 2px 8px rgba(7,193,96,.3);
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:16px;
}
.header h1{font-size:19px;font-weight:700}
.header p{font-size:12px;opacity:.78}
.header .badge{background:rgba(255,255,255,.2);padding:1px 9px;border-radius:9px;font-size:11px}
.main{display:flex;gap:0;height:calc(100vh - 55px)}
.panel-left{flex:1;min-width:0;display:flex;flex-direction:column;background:#fff;border-right:1px solid #e8e8e8}
.panel-tabs{display:flex;border-bottom:1px solid #e8e8e8;background:#fafafa;flex-shrink:0}
.panel-tab{
  padding:8px 16px;font-size:13px;cursor:pointer;
  border:none;background:none;color:#666;font-weight:500;position:relative;transition:color .15s;
}
.panel-tab:hover{color:#07c160}
.panel-tab.active{color:#07c160;background:#fff}
.panel-tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:#07c160}
.panel-body{flex:1;display:flex;flex-direction:column;min-height:0}
.panel-body.hidden{display:none}
#htmlInput{
  flex:1;width:100%;padding:12px 14px;
  border:none;outline:none;resize:none;
  font-family:"Cascadia Code","Fira Code",Consolas,monospace;
  font-size:13px;line-height:1.7;tab-size:2;
}
.upload-zone{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:#999;cursor:pointer;
  border:2px dashed #ddd;margin:14px;border-radius:12px;transition:all .2s;
}
.upload-zone:hover,.upload-zone.dragover{border-color:#07c160;color:#07c160;background:#f0faf4}
.upload-zone svg{width:40px;height:40px;opacity:.4}
.upload-zone p{font-size:13px}
.template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:6px;padding:12px}
.template-card{
  padding:10px 6px;border:1px solid #eee;border-radius:8px;
  text-align:center;cursor:pointer;font-size:12px;color:#666;transition:all .15s;
}
.template-card:hover{border-color:#07c160;color:#07c160;background:#f0faf4}
.template-card .icon{font-size:18px;margin-bottom:3px;display:block}
.image-manager{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.image-card{
  display:flex;gap:10px;align-items:center;
  padding:8px 10px;border:1px solid #eee;border-radius:8px;transition:border-color .15s;
}
.image-card:hover{border-color:#07c160}
.image-card .thumb{
  width:50px;height:50px;border-radius:4px;overflow:hidden;flex-shrink:0;
  background:#f5f5f5;display:flex;align-items:center;justify-content:center;
}
.image-card .thumb img{width:100%;height:100%;object-fit:cover}
.image-card .thumb .broken{color:#ccc;font-size:11px}
.image-card .info{flex:1;min-width:0}
.image-card .info .path{font-size:11px;color:#666;word-break:break-all;margin-bottom:1px}
.image-card .info .meta{font-size:10px;color:#bbb}
.image-card .actions{display:flex;gap:4px;flex-shrink:0}
.image-card .actions button{
  padding:3px 8px;font-size:10px;border:1px solid #ddd;
  border-radius:4px;background:#fff;cursor:pointer;color:#666;
}
.image-card .actions button:hover{border-color:#07c160;color:#07c160}
.image-card .broken-tag{
  display:inline-block;padding:0 7px;border-radius:3px;
  font-size:10px;background:#ffeaa7;color:#856404;margin-left:4px;
}
.image-manager-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:13px}

.toolbar{
  display:flex;gap:6px;padding:7px 12px;
  border-top:1px solid #e8e8e8;flex-wrap:wrap;align-items:center;flex-shrink:0;
}
.toolbar .spacer{flex:1}
.btn{
  display:inline-flex;align-items:center;gap:3px;
  padding:5px 12px;border:none;border-radius:5px;
  font-size:12px;cursor:pointer;font-weight:500;
  transition:all .15s;white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:#07c160;color:#fff}
.btn-primary:hover{background:#06ad56}
.btn-success{background:#2ecc71;color:#fff}
.btn-success:hover{background:#27ae60}
.btn-outline{background:#fff;color:#555;border:1px solid #ddd}
.btn-outline:hover{background:#f5f5f5;border-color:#ccc}
.btn-danger{background:#e74c3c;color:#fff}
.btn-danger:hover{background:#c0392b}
.btn-sm{padding:2px 7px;font-size:11px}

.panel-right{flex:1;min-width:0;display:flex;flex-direction:column;background:#f5f5f5}
.preview-toolbar{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;background:#fff;
  border-bottom:1px solid #e8e8e8;flex-shrink:0;
}
.preview-toolbar .info{font-size:11px;color:#999;flex:1;text-align:right}
.preview-wrapper{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:16px 12px;overflow:auto}
.preview-phone{
  width:420px;min-height:600px;
  background:#fff;box-shadow:0 2px 20px rgba(0,0,0,.1);border-radius:10px;overflow:hidden;
}
.preview-bar{
  display:flex;align-items:center;gap:5px;
  padding:12px 18px 6px;border-bottom:1px solid #eee;
}
.preview-bar .dot{display:inline-block;width:5px;height:5px;border-radius:50%}
.preview-bar .dot.r{background:#ff5f57}
.preview-bar .dot.y{background:#ffbd2e}
.preview-bar .dot.g{background:#28c840}
.preview-bar .label{font-size:10px;color:#ccc;margin-left:4px}
#preview{padding:12px 18px 30px;font-size:15px;line-height:1.75;color:#333;min-height:320px}
#preview p{margin:0 0 .75em}
#preview p:empty{display:none}
#preview h1,#preview h2,#preview h3,#preview h4{margin:1em 0 .4em;font-weight:700;line-height:1.5}
#preview h1{font-size:20px;text-align:center}
#preview h2{font-size:18px}
#preview h3{font-size:16px}
#preview blockquote{margin:.8em 0;padding:8px 14px;background:#f7f7f7;border-left:4px solid #07c160;color:#666;font-size:14px}
#preview ul,#preview ol{margin:.7em 0;padding-left:2em}
#preview li{margin:.2em 0}
#preview table{width:100%;margin:.8em 0;border-collapse:collapse;font-size:14px}
#preview th,#preview td{border:1px solid #ddd;padding:6px 10px;text-align:left}
#preview th{background:#f7f7f7;font-weight:600}
#preview img{max-width:100%;height:auto;display:block;margin:.8em auto;border-radius:4px}
#preview a{color:#07c160;text-decoration:underline}
#preview hr{margin:1.2em 0;border:none;border-top:1px solid #eee}
#preview code{background:#f5f5f5;padding:1px 5px;border-radius:3px;font-size:13px;font-family:Consolas,monospace}
#preview pre{
  background:#2d2d2d;color:#f8f8f2;padding:12px 14px;border-radius:6px;
  overflow-x:auto;margin:.8em 0;font-size:13px;line-height:1.5;
}
#preview pre code{background:none;padding:0;color:inherit;font-size:inherit}

.debug-panel{display:none;border-top:2px solid #e74c3c;background:#1e1e1e;color:#d4d4d4;padding:10px 14px;font-size:12px;font-family:Consolas,monospace;max-height:200px;overflow:auto}
.debug-panel.open{display:block}

.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.78);color:#fff;
  padding:8px 22px;border-radius:8px;
  font-size:13px;z-index:999;pointer-events:none;
  opacity:0;transition:opacity .3s;
}
.toast.show{opacity:1}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  z-index:998;display:none;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:#fff;border-radius:12px;padding:22px;
  width:460px;max-width:90vw;
  box-shadow:0 8px 40px rgba(0,0,0,.15);
}
.modal-box h3{font-size:15px;margin-bottom:10px}
.modal-box label{font-size:12px;color:#666;display:block;margin-bottom:4px}
.modal-box input[type="text"]{
  width:100%;padding:7px 10px;border:1px solid #ddd;
  border-radius:5px;font-size:13px;margin-bottom:10px;
}
.modal-box input[type="text"]:focus{border-color:#07c160;outline:none}
.modal-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:12px}

@media(max-width:800px){
  .main{flex-direction:column;height:auto}
  .panel-left,.panel-right{height:50vh}
  .preview-phone{width:100%;min-height:auto}
}
</style>
</head>
<body>
<div class="header">
  <h1>微信公众号排版转换工具</h1>
  <span class="badge">v4.0</span>
  <p>HTML → WeChat 兼容 · 图片管理 · 一键复制 · 开源</p>
</div>

<div class="main">
  <div class="panel-left">
    <div class="panel-tabs">
      <button class="panel-tab active" data-tab="code">HTML 源码</button>
      <button class="panel-tab" data-tab="upload">上传文件</button>
      <button class="panel-tab" data-tab="templates">排版模板</button>
      <button class="panel-tab" data-tab="images">图片管理 <span id="imgBadge" style="font-size:10px;color:#999;"></span></button>

    <div class="panel-body" id="panel-code">
      <textarea id="htmlInput" placeholder="在此粘贴 HTML 代码…&#10;Ctrl+Enter 快速转换"></textarea>

    <div class="panel-body hidden" id="panel-upload">

        <input type="file" id="fileInput" accept=".html,.htm" hidden>

    </div>
    <div class="panel-body hidden" id="panel-templates">
      <div class="template-grid">
        <div class="template-card" data-template="article"><span class="icon">📝</span>文章正文</div>
        <div class="template-card" data-template="newsletter"><span class="icon">📰</span>资讯简报</div>

        <div class="template-card" data-template="notice"><span class="icon">📢</span>公告通知</div>
        <div class="template-card" data-template="quote"><span class="icon">💬</span>金句卡片</div>

        <div class="template-card" data-template="daily"><span class="icon">📊</span>日报周报</div>
        <div class="template-card" data-template="reading"><span class="icon">📚</span>读书笔记</div>
      </div>

    <div class="panel-body hidden" id="panel-images">

      </div>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" id="convertBtn">🔄 转换</button>
      <button class="btn btn-outline" id="clearBtn">🗑️ 清空</button>
      <button class="btn btn-outline btn-sm" id="debugBtn" style="color:#e74c3c;">🐛 HTML 源码</button>
      <span class="spacer"></span>
      <span id="stats" style="font-size:11px;color:#999;"></span>
    </div>
  </div>

  <div class="panel-right">
    <div class="preview-toolbar">
      <button class="btn btn-success" id="copyHtmlBtn">📋 复制 HTML</button>
      <button class="btn btn-success" id="copyRichBtn">📋 复制富文本（推荐）</button>
      <button class="btn btn-outline btn-sm" id="exportBtn">💾 导出</button>
      <span class="info" id="previewInfo"></span>
    </div>
    <div class="preview-wrapper">
      <div class="preview-phone">
        <div class="preview-bar">
          <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
          <span class="label">微信公众号 · 预览</span>

        <div id="preview"></div>

</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal">

      <button class="btn btn-outline" id="modalCancel">取消</button>
      <button class="btn btn-primary" id="modalConfirm">确认</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ========== DOM refs ========== */
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const htmlInput = $('#htmlInput');
const preview  = $('#preview');
const debugPanel = $('#debugPanel');

/* ========== Toast ========== */
let tmr;
function toast(msg, dur) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(tmr);
  tmr = setTimeout(() => el.classList.remove('show'), dur||1800);
}

/* ========== Tab switch ========== */
$$('.panel-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    $$('.panel-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    $$('.panel-body').forEach(p => p.classList.add('hidden'));
    const tgt = document.getElementById('panel-' + tab.dataset.tab);
    if (tgt) tgt.classList.remove('hidden');
  });
});

/* ========== File upload ========== */
const dropZone = $('#dropZone');
const fileInput = $('#fileInput');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && /\.html?$/i.test(f.name)) readFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) readFile(fileInput.files[0]); });
function readFile(file) {
  const r = new FileReader();
  r.onload = e => { htmlInput.value = e.target.result; $$('[data-tab="code"]')[0].click(); convert(); toast('已加载 '+file.name); };
  r.readAsText(file, 'UTF-8');
}

/* ========== Templates ========== */
const TPL = {
  article: `<h1 style="text-align:center;">文章标题</h1>

<blockquote>引用金句或名人名言，使用引用样式突出显示。</blockquote>`,

<hr>

<hr>
<h2>深度阅读</h2>
<p style="text-indent:2em;">精选内容摘要。</p><blockquote>「真正重要的不是信息数量，而是信息质量。」</blockquote>`,

  product: `<p style="text-align:center;color:#999;font-size:13px;">—— 让生活更简单 ——</p>
<h2 style="text-align:center;">核心功能</h2>
<p style="text-indent:2em;">简洁描述产品价值。</p>
<h3>✦ 功能一</h3><p style="text-indent:2em;">功能描述。</p>
<h3>✦ 功能二</h3><p style="text-indent:2em;">功能描述。</p>
<hr><p style="text-align:center;"><span style="background:#07c160;color:#fff;padding:8px 24px;border-radius:20px;display:inline-block;">立即体验</span></p>`,

  notice: `<p style="color:#999;font-size:13px;">发布日期：2025年4月28日</p><hr>
<p style="font-weight:700;font-size:16px;">致各位读者：</p>

  quote: `<hr>

  list: `<p style="color:#999;font-size:13px;">共 6 项 · 建议收藏</p><hr>

  tutorial: `<h1 style="text-align:center;">技术教程标题</h1>

<hr>

  event: `<h1 style="text-align:center;">🎉 活动名称</h1>

<blockquote style="background:#e8f8f0;border-left-color:#07c160;"><strong>活动亮点：</strong><br>🌟 大咖嘉宾分享<br>🎯 实战工作坊<br>🎁 精美伴手礼</blockquote>

</table>
<h2>报名方式</h2>

/* =====================================================================
   CORE CONVERSION ENGINE (rewritten v4)
   ===================================================================== */

/**
 * Allowed CSS properties (WeChat-compatible subset)
 */
const ALLOWED_CSS = new Set([
  'color','background','background-color','background-image',
  'font-size','font-weight','font-style','font-family',
  'text-align','text-decoration','text-indent',
  'line-height','letter-spacing',
  'margin','margin-top','margin-right','margin-bottom','margin-left',
  'padding','padding-top','padding-right','padding-bottom','padding-left',
  'border','border-top','border-right','border-bottom','border-left',
  'border-color','border-style','border-width','border-collapse','border-radius',
  'width','height','max-width','max-height',
  'display','vertical-align','white-space',
  'list-style','list-style-type','overflow',
]);

function cleanCSS(css) {
  if (!css) return '';
  return css.split(';').map(s => s.trim()).filter(s => {
    const ci = s.indexOf(':');
    if (ci < 0) return false;
    return ALLOWED_CSS.has(s.slice(0, ci).trim());
  }).join('; ');
}

/**
 * Inline styles that WeChat articles commonly support
 */
const DEFAULT_STYLES = {
  table: 'width:100%;border-collapse:collapse;margin:.8em 0',
  th:    'border:1px solid #ddd;padding:6px 10px;background:#f7f7f7;font-weight:600',
  td:    'border:1px solid #ddd;padding:6px 10px',
  blockquote: 'margin:.8em 0;padding:8px 14px;background:#f7f7f7;border-left:4px solid #07c160;color:#666',
  pre:   'background:#2d2d2d;color:#f8f8f2;padding:12px 14px;border-radius:6px;overflow-x:auto;font-size:13px;line-height:1.5',
  img:   'max-width:100%;height:auto;display:block;margin:.8em auto;border-radius:4px',
  hr:    'margin:1.2em 0;border:none;border-top:1px solid #eee',
};

function hasStyle(attr) {
  return attr && /style/i.test(attr);
}

/**
 * Ensure an element has a minium set of styles.
 * Merges with any existing inline style (existing wins on conflict).
 */
function ensureStyle(el, defaultCss) {
  const existing = el.getAttribute('style') || '';
  if (!existing && !defaultCss) return;
  if (!existing) {
    el.setAttribute('style', defaultCss);
    return;
  }
  // Merge: existing properties keep their values, missing ones get defaults
  const merged = {};
  defaultCss.split(';').forEach(d => {
    const ci = d.indexOf(':');
    if (ci > 0) merged[d.slice(0,ci).trim()] = d.slice(ci+1).trim();
  });
  existing.split(';').forEach(d => {
    const ci = d.indexOf(':');
    if (ci > 0) merged[d.slice(0,ci).trim()] = d.slice(ci+1).trim();
  });
  const out = Object.entries(merged).map(([k,v]) => `${k}:${v}`).join(';');
  el.setAttribute('style', out);
}

/**
 * Elements NOT supported by WeChat – will be replaced with their text content
 */
const REMOVE_TAGS = new Set([
  'script','iframe','video','audio','embed','object',
  'canvas','svg','form','input','select','textarea','button',
  'nav','aside','footer','header','link','meta','noscript','style',
]);

/**
 * Attributes preserved during conversion
 */
const KEEP_ATTRS = new Set([
  'style','href','src','alt','title','target',
  'width','height','colspan','rowspan','align','valign',
  'border','cellpadding','cellspacing','bgcolor',
]);

/**
 * Main conversion: raw HTML → WeChat-compatible HTML
 */
function convertHTML(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const body = doc.body || doc.documentElement;

  // --- Step 1: Remove unsupported tags (replace with text) ---
  const removeSel = Array.from(REMOVE_TAGS).join(',');
  doc.querySelectorAll(removeSel).forEach(el => {
    const txt = document.createTextNode(el.textContent || '');
    el.parentNode.replaceChild(txt, el);
  });

  // --- Step 2: Process all elements ---
  function walk(el) {
    if (el.nodeType !== 1) return;
    const tag = el.tagName.toLowerCase();

    // Strip non-allowed attributes
    Array.from(el.attributes).forEach(attr => {
      const n = attr.name.toLowerCase();
      if (n==='style' || n==='class' || n==='id') return;
      if (!KEEP_ATTRS.has(n)) el.removeAttribute(n);
    });
    el.removeAttribute('class');
    el.removeAttribute('id');

    // Ensure default styles for known elements
    if (DEFAULT_STYLES[tag]) {
      ensureStyle(el, DEFAULT_STYLES[tag]);
    }

    // Clean up existing style
    const st = el.getAttribute('style');
    if (st) el.setAttribute('style', cleanCSS(st));

    // Recurse children
    Array.from(el.children).forEach(walk);
  }
  Array.from(body.children).forEach(walk);

  // --- Step 3: Extract image info ---
  const images = [];
  doc.querySelectorAll('img').forEach(img => {
    const src = img.getAttribute('src') || '';
    images.push({
      origSrc: src,
      currentSrc: src,
      alt: img.getAttribute('alt') || '',
      width: img.getAttribute('width') || '',
      height: img.getAttribute('height') || '',
      broken: !src || src.startsWith('file://'),
    });
  });

  // --- Step 4: Serialize ---
  let out = body.innerHTML;

  // Clean wrapper tags (shouldn't be needed but just in case)
  out = out.replace(/<\/?body[^>]*>/gi,'');
  out = out.replace(/<\/?html[^>]*>/gi,'');
  out = out.replace(/<\/?head[^>]*>/gi,'');
  out = out.replace(/<!\[CDATA\[/g,'').replace(/\]\]>/g,'');

  // --- Step 5: Stats ---
  const textContent = body.textContent || '';
  const charCount = textContent.replace(/\s/g,'').length;
  const pCount = (out.match(/<p[ >]/gi)||[]).length;
  const imgCount = (out.match(/<img[ >]/gi)||[]).length;
  const readTime = Math.max(1, Math.round(charCount/300));

  return { html: out, images, stats: { chars: charCount, paragraphs: pCount, images: imgCount, readTime } };
}

/* ========== Image Manager ========== */
let imageList = [];
const imgManager = $('#imageManager');
const imgBadge = $('#imgBadge');

function renderImages() {
  if (imageList.length === 0) {
    imgManager.innerHTML = '<div class="image-manager-empty">当前内容中没有图片</div>';
    imgBadge.textContent = '';
    return;
  }
  imgBadge.textContent = `(${imageList.length})`;
  const tip = `<div style="background:#e8f8f0;border:1px solid #b2dfc8;border-radius:8px;padding:8px 12px;font-size:11px;color:#2c6e49;margin-bottom:8px;">
    💡 图片无法显示？上传到图床（<a href="https://www.boltp.com/?ref=www.7udh.com" target="_blank" style="color:#07c160;">boltp.com</a>），然后编辑下方路径。
  </div>`;
  let cards = tip;
  imageList.forEach((img, i) => {
    const broken = img.broken || !img.currentSrc || img.currentSrc.startsWith('file://');
    const thumb = broken ? '<span class="broken">⚠️</span>'
      : `<img src="${img.currentSrc.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}" onerror="this.parentElement.innerHTML='<span class=\\'broken\\'>⚠️</span>'" alt="">`;
    cards += `<div class="image-card">
      <div class="thumb">${thumb}</div>
      <div class="info">
        <div class="path">${(img.currentSrc||'(空)').slice(0,50)}${((img.currentSrc||'').length>50?'…':'')} ${broken?'<span class="broken-tag">需处理</span>':''}</div>
        <div class="meta">${img.alt?'alt: '+img.alt.slice(0,20)+' · ':''}${img.width||img.height?img.width+'×'+img.height+' · ':''}索引 ${i+1}</div>
      </div>
      <div class="actions">
        <button data-idx="${i}" class="im-edit">编辑</button>
        <button data-idx="${i}" class="im-preview" ${broken?'disabled':''}>预览</button>
      </div>
    </div>`;
  });
  imgManager.innerHTML = cards;
  imgManager.querySelectorAll('.im-edit').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.idx);
      showModal('编辑图片路径 #'+(i+1), imageList[i].currentSrc, (v) => {
        if (v && v !== imageList[i].currentSrc) {
          imageList[i].currentSrc = v;
          syncImages();
          toast('图片路径已更新');
        }
      });
    });
  });
  imgManager.querySelectorAll('.im-preview').forEach(btn => {
    btn.addEventListener('click', () => {
      const src = imageList[parseInt(btn.dataset.idx)].currentSrc;
      if (src) window.open(src, '_blank');
    });
  });
}

function syncImages() {
  // Re-apply image src changes to the preview DOM
  let i = 0;
  preview.querySelectorAll('img').forEach(img => {
    if (i < imageList.length && imageList[i].currentSrc !== imageList[i].origSrc) {
      img.setAttribute('src', imageList[i].currentSrc);
    }
    i++;
  });
}

/* ========== Main convert function ========== */
function convert() {
  const raw = htmlInput.value.trim();
  if (!raw) {
    preview.innerHTML = '<p style="color:#bbb;text-align:center;padding:60px 0;">请输入 HTML 内容后点击转换</p>';
    debugPanel.classList.remove('open');
    debugPanel.textContent = '';
    $('#stats').textContent = '';
    $('#previewInfo').textContent = '等待输入…';
    imageList = [];
    renderImages();
    return;
  }

  try {
    const result = convertHTML(raw);
    preview.innerHTML = result.html;
    debugPanel.textContent = result.html;
    imageList = result.images;
    renderImages();

    const s = result.stats;
    $('#stats').textContent = `字符 ${s.chars} · 段落 ${s.paragraphs} · 图片 ${s.images} · 阅读约 ${s.readTime} 分钟`;
    $('#previewInfo').textContent = `预览 · ${s.chars} 字`;

    // Mark broken images in preview
    preview.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('src')||'';
      if (!src || src.startsWith('file://')) {
        img.style.border = '2px dashed #e74c3c';
        img.style.padding = '4px';
        img.style.background = '#fff5f5';
      }
    });

  } catch(e) {
    preview.innerHTML = `<p style="color:#e74c3c;padding:40px;text-align:center;">转换出错：${e.message}</p>`;
    debugPanel.textContent = 'Error: ' + e.message + '\n' + e.stack;
    toast('转换出错', 2000);
  }
}

/* ========== Copy / Export ========== */
function wrapHTML(inner) {
  return `<!-- 微信公众号排版 - 转换工具 -->
<section style="padding:0 10px;max-width:100%;">
${inner}
</section>`;
}

$('#copyHtmlBtn').addEventListener('click', () => {
  const h = preview.innerHTML;
  if (!h||h.startsWith('<p style="color:#bbb')) { toast('请先转换内容'); return; }
  const w = wrapHTML(h);
  navigator.clipboard.write([new ClipboardItem({ 'text/plain': new Blob([w], {type:'text/plain'}) })]).then(() => {
    toast('HTML 已复制，粘贴到公众号编辑器', 1600);
  }).catch(() => fallbackCopy(w, 'HTML 已复制'));
});

$('#copyRichBtn').addEventListener('click', () => {
  const h = preview.innerHTML;
  if (!h||h.startsWith('<p style="color:#bbb')) { toast('请先转换内容'); return; }
  const rich = wrapHTML(h);
  navigator.clipboard.write([new ClipboardItem({ 'text/html': new Blob([rich], {type:'text/html'}) })]).then(() => {
    toast('富文本已复制！可直接粘贴到公众号编辑器', 1600);
  }).catch(() => fallbackCopy(rich, '已复制 HTML'));
});

function fallbackCopy(text, msg) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); toast(msg); }
  catch(e) { toast('复制失败，请手动选择复制'); }
  document.body.removeChild(ta);
}

$('#exportBtn').addEventListener('click', () => {
  const h = preview.innerHTML;
  if (!h||h.startsWith('<p style="color:#bbb')) { toast('请先转换内容'); return; }
  const full = `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>公众号文章</title></head>
<body style="font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;padding:20px;max-width:680px;margin:0 auto;color:#333;font-size:15px;line-height:1.75;">
${h}
</body></html>`;
  const blob = new Blob([full], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'wechat-article.html';
  a.click(); URL.revokeObjectURL(url);
  toast('已导出 wechat-article.html');
});

/* ========== Paste rich text handler ========== */
htmlInput.addEventListener('paste', () => {
  setTimeout(() => {
    const text = htmlInput.value;
    if (!text || /<[a-z][\s\S]*>/i.test(text.slice(0,200))) return;
    navigator.clipboard.read().then(items => {
      for (const item of items) {
        if (item.types.includes('text/html')) {
          item.getType('text/html').then(blob => blob.text().then(rich => {
            if (rich && rich.length > text.length) {
              htmlInput.value = rich;
              convert();
            }
          }));
          break;
        }
      }
    }).catch(() => {});
  }, 120);
});
